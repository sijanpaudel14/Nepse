name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'nepse-saas-frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: nepse-saas-frontend/yarn.lock

      - name: Install dependencies
        working-directory: nepse-saas-frontend
        run: yarn install --frozen-lockfile

      - name: Build project
        working-directory: nepse-saas-frontend
        env:
          NEXT_PUBLIC_API_URL: https://nepse-api.calmwater-c82ed95c.southeastasia.azurecontainerapps.io
        run: yarn build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        working-directory: nepse-saas-frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret not set. Please add GitHub secrets."
            echo "See GITHUB_SECRETS_SETUP.md for instructions"
            exit 1
          fi
          
          vercel deploy --prod --token=$VERCEL_TOKEN

      - name: Post deployment summary
        if: success()
        run: |
          echo "### 🎨 Frontend Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Production URL:** https://nepse.sijanpaudel.com.np" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 Your app is live on Vercel!" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "### ❌ Frontend Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs for details. If VERCEL_TOKEN is missing, see GITHUB_SECRETS_SETUP.md" >> $GITHUB_STEP_SUMMARY
